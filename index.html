<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Assignment {1}</title>
  </head>
  <link rel="stylesheet" href="styling prac.css" />

  <link
    rel="icon"
    href="../product-preview-card-component-main/images/favicon-32x32.png"
  />

  <body>
    <div class="card">
      <img
        src="../product-preview-card-component-main/images/image-product-desktop.jpg"
        alt="chanel perfume"
      />
      <div class="content">
        <p class="category">PERFUME</p>
        <h1>Gabrielle Essence Eau De Parfum</h1>
        <p class="description">
          floral, solar and voluptuous interpretation composed by Olivier Polge,
          Perfumer-Creator for the House of CHANEL.
        </p>

        <div class="price">
          <span class="newprice">$149.99</span>
          <span class="oldprice">$169.99</span>
        </div>

        <button class="shop">
          <img
            src="../product-preview-card-component-main/images/icon-cart.svg"
          />
          Add to Cart
        </button>
      </div>
    </div>
  </body>
</html>
